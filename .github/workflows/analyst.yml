name: Weekly Analyst

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai groq google-auth google-api-python-client

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BLOG: ${{ secrets.GEMINI_API_KEY_BLOG }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          GROQ_API_KEY_6: ${{ secrets.GROQ_API_KEY_6 }}
          GROQ_API_KEY_7: ${{ secrets.GROQ_API_KEY_7 }}
          GROQ_API_KEY_8: ${{ secrets.GROQ_API_KEY_8 }}
          GROQ_API_KEY_9: ${{ secrets.GROQ_API_KEY_9 }}
          GROQ_API_KEY_10: ${{ secrets.GROQ_API_KEY_10 }}
          GROQ_API_KEY_11: ${{ secrets.GROQ_API_KEY_11 }}
          GROQ_API_KEY_12: ${{ secrets.GROQ_API_KEY_12 }}
          GROQ_API_KEY_13: ${{ secrets.GROQ_API_KEY_13 }}
          GROQ_API_KEY_14: ${{ secrets.GROQ_API_KEY_14 }}
          GROQ_API_KEY_15: ${{ secrets.GROQ_API_KEY_15 }}
          GROQ_API_KEY_16: ${{ secrets.GROQ_API_KEY_16 }}
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
        run: python scripts/analyst.py

      - name: Commit updated data
        run: |
          git config user.email "analyst@theritualjournalcollective.com"
          git config user.name "RJC Analyst"
          git add performance_memory.json topic_queue.json
          git diff --staged --quiet || git commit -m "data: weekly analysis $(date +%Y-%m-%d)"
          git push
