name: Publish Article

on:
  schedule:
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:

concurrency:
  group: rjc-publisher
  cancel-in-progress: false
    inputs:
      dry_run:
        description: 'Dry run (generate but do not commit)'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai groq

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BLOG: ${{ secrets.GEMINI_API_KEY_BLOG }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          GROQ_API_KEY_6: ${{ secrets.GROQ_API_KEY_6 }}
          GROQ_API_KEY_7: ${{ secrets.GROQ_API_KEY_7 }}
          GROQ_API_KEY_8: ${{ secrets.GROQ_API_KEY_8 }}
          GROQ_API_KEY_9: ${{ secrets.GROQ_API_KEY_9 }}
          GROQ_API_KEY_10: ${{ secrets.GROQ_API_KEY_10 }}
          GROQ_API_KEY_11: ${{ secrets.GROQ_API_KEY_11 }}
          GROQ_API_KEY_12: ${{ secrets.GROQ_API_KEY_12 }}
          GROQ_API_KEY_13: ${{ secrets.GROQ_API_KEY_13 }}
          GROQ_API_KEY_14: ${{ secrets.GROQ_API_KEY_14 }}
          GROQ_API_KEY_15: ${{ secrets.GROQ_API_KEY_15 }}
          GROQ_API_KEY_16: ${{ secrets.GROQ_API_KEY_16 }}
        run: python scripts/publisher.py

      - name: Commit and push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.email "publisher@theritualjournalcollective.com"
          git config user.name "RJC Publisher"
          git add -A
          TITLE=$(cat /tmp/article_title.txt 2>/dev/null || echo "new article")
          git diff --staged --quiet || git commit -m "publish: $(date +%Y-%m-%d) - $TITLE"
          git push

      - name: Deploy to Cloudflare Pages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          wrangler pages deploy . --project-name theritualjournalcollective --branch main
