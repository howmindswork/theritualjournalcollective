name: Publish Article

on:
  schedule:
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but do not commit)'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/publisher.py

      - name: Commit and push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.email "publisher@theritualjournalcollective.com"
          git config user.name "RJC Publisher"
          git add -A
          TITLE=$(cat /tmp/article_title.txt 2>/dev/null || echo "new article")
          git diff --staged --quiet || git commit -m "publish: $(date +%Y-%m-%d) - $TITLE"
          git push
